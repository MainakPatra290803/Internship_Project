services:
  # ========================
  # Backend FastAPI Service
  # ========================
  - type: web
    name: ai-tutor-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./sql_app.db
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your frontend Render URL
      - key: USE_LOCAL_LLM
        value: "false"
      - key: MAIL_FROM
        value: noreply@aitutor.com

  # ========================
  # Frontend Next.js Service
  # ========================
  - type: web
    name: ai-tutor-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: ai-tutor-backend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
