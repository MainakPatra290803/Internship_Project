services:
  # ========================
  # Backend FastAPI Service
  # ========================
  - type: web
    name: agentic-ai-tutor-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: QUIZ_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your frontend Render URL e.g. https://agentic-ai-tutor.onrender.com
      - key: USE_LOCAL_LLM
        value: "false"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false

  # ========================
  # Frontend Next.js Service
  # ========================
  - type: web
    name: agentic-ai-tutor-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: agentic-ai-tutor-backend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

# ========================
# PostgreSQL Database
# ========================
databases:
  - name: agentic-ai-db
    region: oregon
    plan: free
    databaseName: agenticai
    user: agenticai_user
